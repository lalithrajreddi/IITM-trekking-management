{% extends "base.html" %}

{% block title %}My Profile - Trekking Management Application{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-4">My Profile</h2>

        <div class="card shadow-sm">
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('user.profile') }}">
                    <div class="mb-3">
                        <label class="form-label text-muted">Email Address (Cannot be changed)</label>
                        <input type="email" class="form-control bg-light" value="{{ user.email }}" disabled>
                    </div>

                    <div class="mb-3">
                        <label for="full_name" class="form-label">Full Name</label>
                        <input type="text" class="form-control" id="full_name" name="full_name" value="{{ user.full_name }}" required>
                    </div>

                    <div class="mb-4">
                        <label for="contact" class="form-label">Contact Number</label>
                        <input type="text" class="form-control" id="contact" name="contact" value="{{ user.contact or '' }}" placeholder="e.g. 9876543210">
                    </div>

                    <button type="submit" class="btn btn-primary w-100 fw-bold">Update Profile</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
